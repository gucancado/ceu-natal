version: "3.9"

services:
  ceu-natal:
    build: .
    container_name: ceu-natal
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MCP_SERVER_NAME=${MCP_SERVER_NAME:-ceu-natal}
      - MCP_SERVER_VERSION=${MCP_SERVER_VERSION:-2.0.0}
      - MCP_HOST=${MCP_HOST:-0.0.0.0}
      - MCP_PORT=${MCP_PORT:-8000}
      - GEOCODER_CACHE_PATH=${GEOCODER_CACHE_PATH:-/var/cache/ceu-natal/geocode-cache.json}
    volumes:
      - ceu-natal-cache:/var/cache/ceu-natal
    restart: unless-stopped

volumes:
  ceu-natal-cache:
